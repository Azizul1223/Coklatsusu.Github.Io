  <script>
    // ============================================================
    //  SOUND ENGINE — Web Audio API (tidak butuh file eksternal)
    // ============================================================
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let ctx = null;

    function getCtx() {
      if (!ctx) ctx = new AudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    function playTone({ freq = 440, type = 'sine', duration = 0.12, volume = 0.4, delay = 0, attack = 0.01 }) {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain);
      gain.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      gain.gain.setValueAtTime(0, c.currentTime + delay);
      gain.gain.linearRampToValueAtTime(volume, c.currentTime + delay + attack);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + duration + 0.05);
    }

    function playNoise({ duration = 0.08, volume = 0.15, delay = 0 }) {
      const c = getCtx();
      const bufSize = c.sampleRate * duration;
      const buf = c.createBuffer(1, bufSize, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource();
      src.buffer = buf;
      const gain = c.createGain();
      gain.gain.setValueAtTime(volume, c.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
      const filter = c.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1200;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(c.destination);
      src.start(c.currentTime + delay);
      src.stop(c.currentTime + delay + duration + 0.05);
    }

    const sounds = {
      pageLoad() {
        [523, 659, 784, 1047].forEach((f, i) => {
          playTone({ freq: f, type: 'triangle', duration: 0.18, volume: 0.25, delay: i * 0.1 });
        });
      },
      hover() {
        playTone({ freq: 880, type: 'sine', duration: 0.07, volume: 0.18, attack: 0.005 });
      },
      instagram() {
        playTone({ freq: 660, type: 'sine',     duration: 0.12, volume: 0.35 });
        playTone({ freq: 990, type: 'triangle', duration: 0.12, volume: 0.2, delay: 0.07 });
      },
      tiktok() {
        playNoise({ duration: 0.05, volume: 0.2 });
        playTone({ freq: 220, type: 'square', duration: 0.1, volume: 0.3, delay: 0.04 });
        playTone({ freq: 440, type: 'square', duration: 0.08, volume: 0.2, delay: 0.12 });
      },
      steam() {
        // Suara "klik mekanik" ala game launcher
        playNoise({ duration: 0.03, volume: 0.25 });
        playTone({ freq: 180, type: 'sine', duration: 0.15, volume: 0.3, delay: 0.02 });
        playTone({ freq: 360, type: 'sine', duration: 0.1,  volume: 0.2, delay: 0.1  });
      },
      roblox() {
        // Suara "oof" khas Roblox — nada turun
        playTone({ freq: 500, type: 'sine', duration: 0.08, volume: 0.35 });
        playTone({ freq: 350, type: 'sine', duration: 0.12, volume: 0.3, delay: 0.07 });
        playTone({ freq: 250, type: 'sine', duration: 0.1,  volume: 0.2, delay: 0.17 });
      },
      saweria() {
        [1047, 1319, 1568].forEach((f, i) => {
          playTone({ freq: f, type: 'triangle', duration: 0.14, volume: 0.28, delay: i * 0.06 });
        });
        playNoise({ duration: 0.04, volume: 0.1, delay: 0.03 });
      },
      avatar() {
        playTone({ freq: 784,  type: 'sine',     duration: 0.1,  volume: 0.3  });
        playTone({ freq: 988,  type: 'sine',     duration: 0.1,  volume: 0.25, delay: 0.1 });
        playTone({ freq: 1175, type: 'triangle', duration: 0.15, volume: 0.2,  delay: 0.2 });
      }
    };

    window.addEventListener('load', () => {
      setTimeout(() => sounds.pageLoad(), 400);
    });

    document.querySelectorAll('.card').forEach(card => {
      const soundName = card.dataset.sound;
      card.addEventListener('mouseenter', () => sounds.hover());
      card.addEventListener('mousedown', () => {
        if (sounds[soundName]) sounds[soundName]();
      });
      card.addEventListener('touchstart', () => {
        sounds.hover();
        if (sounds[soundName]) sounds[soundName]();
      }, { passive: true });
    });

    const avatarWrap = document.getElementById('avatar-wrap');
    avatarWrap.addEventListener('click', () => sounds.avatar());
    avatarWrap.addEventListener('touchstart', () => sounds.avatar(), { passive: true });
  </script>
