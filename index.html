  <!-- Particle Canvas -->
  <canvas id="particles" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

  <script>
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let ctx = null;
    function getCtx() {
      if (!ctx) ctx = new AudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    function playTone({ freq=440, type='sine', duration=0.12, volume=0.4, delay=0, attack=0.01 }) {
      const c = getCtx();
      const osc = c.createOscillator(), gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      gain.gain.setValueAtTime(0, c.currentTime + delay);
      gain.gain.linearRampToValueAtTime(volume, c.currentTime + delay + attack);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + duration + 0.05);
    }
    function playNoise({ duration=0.08, volume=0.15, delay=0 }) {
      const c = getCtx(), bufSize = c.sampleRate * duration;
      const buf = c.createBuffer(1, bufSize, c.sampleRate), data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(), gain = c.createGain(), filter = c.createBiquadFilter();
      src.buffer = buf;
      gain.gain.setValueAtTime(volume, c.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
      filter.type = 'bandpass'; filter.frequency.value = 1200;
      src.connect(filter); filter.connect(gain); gain.connect(c.destination);
      src.start(c.currentTime + delay); src.stop(c.currentTime + delay + duration + 0.05);
    }
    const sounds = {
      pageLoad()  { [523,659,784,1047].forEach((f,i) => playTone({freq:f,type:'triangle',duration:0.18,volume:0.22,delay:i*0.09})); },
      hover()     { playTone({freq:880,type:'sine',duration:0.06,volume:0.14,attack:0.004}); },
      instagram() { playTone({freq:660,type:'sine',duration:0.12,volume:0.32}); playTone({freq:990,type:'triangle',duration:0.12,volume:0.18,delay:0.07}); },
      tiktok()    { playNoise({duration:0.05,volume:0.18}); playTone({freq:220,type:'square',duration:0.1,volume:0.28,delay:0.04}); playTone({freq:440,type:'square',duration:0.08,volume:0.18,delay:0.12}); },
      steam()     { playNoise({duration:0.03,volume:0.22}); playTone({freq:180,type:'sine',duration:0.15,volume:0.28,delay:0.02}); playTone({freq:360,type:'sine',duration:0.1,volume:0.18,delay:0.1}); },
      roblox()    { playTone({freq:500,type:'sine',duration:0.08,volume:0.32}); playTone({freq:350,type:'sine',duration:0.12,volume:0.28,delay:0.07}); playTone({freq:250,type:'sine',duration:0.1,volume:0.18,delay:0.17}); },
      saweria()   { [1047,1319,1568].forEach((f,i) => playTone({freq:f,type:'triangle',duration:0.14,volume:0.25,delay:i*0.06})); playNoise({duration:0.04,volume:0.09,delay:0.03}); },
      avatar()    { playTone({freq:784,type:'sine',duration:0.1,volume:0.28}); playTone({freq:988,type:'sine',duration:0.1,volume:0.22,delay:0.1}); playTone({freq:1175,type:'triangle',duration:0.15,volume:0.18,delay:0.2}); }
    };
    window.addEventListener('load', () => setTimeout(() => sounds.pageLoad(), 400));
    document.querySelectorAll('.card').forEach(card => {
      const sn = card.dataset.sound;
      card.addEventListener('mouseenter', () => sounds.hover());
      card.addEventListener('mousedown',  () => { if (sounds[sn]) sounds[sn](); });
      card.addEventListener('touchstart', () => { sounds.hover(); if (sounds[sn]) sounds[sn](); }, {passive:true});
    });
    document.getElementById('avatar-wrap').addEventListener('click',      () => sounds.avatar());
    document.getElementById('avatar-wrap').addEventListener('touchstart', () => sounds.avatar(), {passive:true});

    /* ─── MUSIC PLAYER ─── */
    const audio = new Audio();
    let curIdx = 0, isPlaying = false;
    let playlist = [
      { name: 'III (Sena x Justen Cover)', artist: 'Sena Kiryuin', url: 'musik/III (Sena x Justen Cover) - Sena Kiryuin.mp3' }
    ];

    const elPlayer   = document.getElementById('music-player');
    const elToggle   = document.getElementById('player-toggle');
    const elPlayBtn  = document.getElementById('play-btn');
    const elPlayIcon = document.getElementById('play-icon');
    const elPrev     = document.getElementById('prev-btn');
    const elNext     = document.getElementById('next-btn');
    const elFill     = document.getElementById('progress-fill');
    const elPBar     = document.getElementById('progress-bar');
    const elTimeCur  = document.getElementById('time-cur');
    const elTimeTot  = document.getElementById('time-tot');
    const elVol      = document.getElementById('volume-slider');
    const elFileInp  = document.getElementById('file-input');
    const elName     = document.getElementById('track-name');
    const elArtist   = document.getElementById('track-artist');
    const elAlbum    = document.getElementById('album-art');
    const vizBars    = document.querySelectorAll('.viz-bar');

    let playerOpen = false;
    audio.volume = 0.7;

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    }
    function setVizActive(on) { vizBars.forEach(b => b.classList.toggle('active', on)); }
    function updatePlayIcon(playing) {
      elPlayIcon.innerHTML = playing
        ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
        : '<path d="M8 5v14l11-7z"/>';
    }
    function loadTrack(idx) {
      if (!playlist.length) return;
      const t = playlist[idx];
      audio.src = t.url;
      elName.textContent   = t.name;
      elArtist.textContent = t.artist || `Track ${idx+1} / ${playlist.length}`;
      elFill.style.width   = '0%';
      elTimeCur.textContent = '0:00';
      elTimeTot.textContent = '0:00';
      if (isPlaying) audio.play();
    }
    loadTrack(0);

    function playPause() {
      if (!playlist.length) return;
      if (isPlaying) {
        audio.pause(); isPlaying = false;
        elAlbum.classList.remove('spinning'); setVizActive(false);
      } else {
        audio.play(); isPlaying = true;
        elAlbum.classList.add('spinning'); setVizActive(true);
      }
      updatePlayIcon(isPlaying);
    }

    elToggle.addEventListener('click', () => {
      playerOpen = !playerOpen;
      elPlayer.classList.toggle('hidden', !playerOpen);
    });
    elPlayBtn.addEventListener('click', playPause);
    elPrev.addEventListener('click', () => { if (!playlist.length) return; curIdx=(curIdx-1+playlist.length)%playlist.length; loadTrack(curIdx); });
    elNext.addEventListener('click', () => { if (!playlist.length) return; curIdx=(curIdx+1)%playlist.length; loadTrack(curIdx); });
    audio.addEventListener('ended', () => { curIdx=(curIdx+1)%playlist.length; loadTrack(curIdx); });
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      elFill.style.width = (audio.currentTime/audio.duration*100)+'%';
      elTimeCur.textContent = fmt(audio.currentTime);
    });
    audio.addEventListener('loadedmetadata', () => { elTimeTot.textContent = fmt(audio.duration); });
    elPBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = elPBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX-rect.left)/rect.width)*audio.duration;
    });
    elVol.addEventListener('input', () => { audio.volume = elVol.value; });
    elFileInp.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      playlist = [...playlist, ...files.map(f => ({ name: f.name.replace(/\.[^.]+$/,''), artist: 'Upload', url: URL.createObjectURL(f) }))];
    });

    /* ─── Particles ─── */
    const canvas = document.getElementById('particles');
    const ctx2   = canvas.getContext('2d');
    let W, H, stars = [];
    function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
    function randomStar() {
      return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.2+0.2, alpha:Math.random()*0.5+0.1,
               speed:Math.random()*0.25+0.05, drift:(Math.random()-0.5)*0.15,
               twinkleSpeed:Math.random()*0.008+0.003, twinkleOffset:Math.random()*Math.PI*2 };
    }
    function initStars() { stars=Array.from({length:Math.min(Math.floor(W*H/6000),120)},randomStar); }
    function draw(t) {
      ctx2.clearRect(0,0,W,H);
      for (const s of stars) {
        const tw=s.alpha*(0.6+0.4*Math.sin(t*s.twinkleSpeed+s.twinkleOffset));
        ctx2.beginPath(); ctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx2.fillStyle=`rgba(180,210,255,${tw})`; ctx2.fill();
        s.y-=s.speed; s.x+=s.drift;
        if(s.y<-4){s.y=H+4;s.x=Math.random()*W;}
        if(s.x<-4)s.x=W+4; if(s.x>W+4)s.x=-4;
      }
      requestAnimationFrame(draw);
    }
    resize(); initStars();
    window.addEventListener('resize',()=>{resize();initStars();});
    requestAnimationFrame(draw);

    /* ─── Typing ─── */
    const phrases=['Content Creator','Gamer','Video Editor'];
    const el=document.getElementById('typing-text');
    let pi=0,ci=0,deleting=false;
    function type(){
      const phrase=phrases[pi];
      if(!deleting){
        el.textContent=phrase.slice(0,++ci);
        if(ci===phrase.length){deleting=true;setTimeout(type,1800);return;}
        setTimeout(type,65+Math.random()*40);
      } else {
        el.textContent=phrase.slice(0,--ci);
        if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(type,400);return;}
        setTimeout(type,35);
      }
    }
    setTimeout(type,900);
  </script>
